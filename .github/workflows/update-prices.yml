name: Update Prices
on:
  schedule:
    - cron: '*/15 9-18 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch prices
        run: |
          mkdir -p data
          node -e "
          const API_KEY = 'nuDX73vj2483KSUgvenkj9t50oA0vgvA4WcuRAER';
          const SIMBOLOS = {
            'DLR/MAY26': 'Mayo 26',
            'DLR/NOV26': 'Nov 26',
            'DLR/MAY27': 'Mayo 27'
          };
          (async () => {
            const fs = require('fs');
            const precios = {};
            for (const [sim, label] of Object.entries(SIMBOLOS)) {
              const url = 'https://api.primary.com.ar/rest/marketdata/get?marketId=ROFX&symbol=' + encodeURIComponent(sim) + '&entries=LA,CL,SE,BI';
              const r = await fetch(url, { headers: { 'X-Auth-Token': API_KEY } });
              const d = await r.json();
              console.log(sim, JSON.stringify(d));
              const md = d?.marketData;
              precios[label] = md?.LA?.price ?? md?.CL?.price ?? md?.SE?.price ?? md?.BI?.price ?? null;
            }
            console.log('PRECIOS FINALES:', JSON.stringify(precios));
            fs.writeFileSync('data/prices.json', JSON.stringify({ precios, updated: new Date().toISOString() }, null, 2));
          })();
          "
      - run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "Update prices"
          git push
