name: Update Prices
on:
  schedule:
    - cron: '*/15 9-18 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install playwright
      - run: npx playwright install chromium --with-deps
      - name: Scrape prices
        run: |
          node -e "
          const { chromium } = require('playwright');
          const fs = require('fs');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.goto('https://matbarofex.primary.ventures/fyo/futurosfinancieros', { waitUntil: 'networkidle', timeout: 30000 });
            await page.waitForSelector('table tbody tr', { timeout: 20000 });
            const precios = await page.evaluate(() => {
              const result = {};
              const obj = { 'DLR/MAY26': 'Mayo 26', 'DLR/NOV26': 'Nov 26', 'DLR/MAY27': 'Mayo 27' };
              document.querySelectorAll('table tbody tr').forEach(row => {
                const cells = row.querySelectorAll('td');
                if (!cells.length) return;
                const inst = cells[0]?.textContent?.trim();
                if (!obj[inst]) return;
                for (let i = 6; i >= 1; i--) {
                  const raw = cells[i]?.textContent?.trim()?.replace(/\./g,'')?.replace(',','.');
                  const num = parseFloat(raw);
                  if (num > 100) { result[obj[inst]] = num; break; }
                }
              });
              return result;
            });
            await browser.close();
            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/prices.json', JSON.stringify({ precios, updated: new Date().toISOString() }, null, 2));
            console.log('OK:', JSON.stringify(precios));
          })().catch(e => { console.error(e); process.exit(1); });
          "
      - run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "Update prices"
          git push
